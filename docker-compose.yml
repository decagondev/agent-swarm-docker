# Legacy compose file — kept building only to preserve regression continuity
# through Epic 1. Deleted in slice 9 once the new architecture is the only path.
# For the post-refactor dev flow, use docker/compose.dev.yml.

services:
  orchestrator:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python orchestrator.py
    volumes:
      - ./shared-data:/app/data

  capitalize-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python worker.py --task capitalize
    volumes:
      - ./shared-data:/app/data

  reverse-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python worker.py --task reverse
    volumes:
      - ./shared-data:/app/data

  consonant-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python worker.py --task count_consonants
    volumes:
      - ./shared-data:/app/data

  vowel-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python worker.py --task vowel_random
    volumes:
      - ./shared-data:/app/data
