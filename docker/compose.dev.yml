# Local-dev compose for the new architecture.
# Run from repo root:
#   docker compose -f docker/compose.dev.yml build
#   docker compose -f docker/compose.dev.yml run --rm orchestrator python orchestrator.py "..."
#
# The orchestrator fans out to all registered agents via subprocess; no
# per-task worker services are needed. Epic 3 replaces this single-service
# layout with dynamic Swarm services spawned at runtime.

services:
  orchestrator:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agent-swarm:dev
    command: python orchestrator.py
    volumes:
      - ../shared-data:/app/data
