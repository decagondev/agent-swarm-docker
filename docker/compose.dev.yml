# Local-dev compose for the LLM Supervisor (Epic 2).
# Run from repo root:
#   docker compose -f docker/compose.dev.yml build
#   docker compose -f docker/compose.dev.yml run --rm supervisor python supervisor.py "..."
#
# Requires a populated .env (LLM_PROVIDER + matching API key). The Supervisor
# fans out to registered agents via an in-process thread pool. Epic 3 replaces
# this with dynamic Swarm services spawned at runtime.

services:
  supervisor:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: agent-swarm:dev
    command: python supervisor.py
    env_file:
      - ../.env
    volumes:
      - ../shared-data:/app/data
